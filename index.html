<script>

  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rcWVoYnRpeWlwYnltYmdncHJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjM0ODMsImV4cCI6MjA5NDc5OTQ4M30.rOqD4NgCo1SMRa-yopsNLw7fl56pKepDEoHn6m44mkI'

  const DAILY_POINTS  = 10
  const STREAK_BONUS  = 10
  const STREAK_DAYS   = 5
</script>
<style>
:root{--navy:#1e2157;--navy-dark:#12153a;--navy-mid:#252a6e;--peach:#e8a87c;--peach-pale:rgba(232,168,124,0.12);--peach-light:#f0c4a0;--white:#f5f5f2;--muted:rgba(245,245,242,0.52);--card-bg:rgba(255,255,255,0.06);--card-border:rgba(255,255,255,0.11);--green:#6ecf8a;--green-bg:rgba(110,207,138,0.12);--green-border:rgba(110,207,138,0.28);--danger:#e06b5a;--danger-bg:rgba(224,107,90,0.12);--danger-border:rgba(224,107,90,0.28);--radius:12px;--radius-sm:8px;--font-d:'Bebas Neue',sans-serif;--font-b:'DM Sans',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:var(--navy-dark);color:var(--white);font-family:var(--font-b);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.site-header{background:linear-gradient(160deg,#151840 0%,#1e2157 55%,#252a6e 100%);padding:20px 18px 0;border-bottom:3px solid var(--peach);position:relative;overflow:hidden;flex-shrink:0;}
.site-header::before{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(90deg,rgba(232,168,124,.04) 0,rgba(232,168,124,.04) 1px,transparent 1px,transparent 48px),repeating-linear-gradient(0deg,rgba(232,168,124,.04) 0,rgba(232,168,124,.04) 1px,transparent 1px,transparent 48px);}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;}
.header-crest{width:54px;height:54px;flex-shrink:0;border:2px solid var(--peach);border-radius:10px;overflow:hidden;}
.header-crest img{width:100%;height:100%;object-fit:cover;}
.header-title{font-family:var(--font-d);font-size:28px;letter-spacing:1px;line-height:1;}
.header-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.week-badge{font-family:var(--font-d);font-size:15px;background:var(--peach);color:var(--navy-dark);padding:5px 12px;border-radius:var(--radius-sm);white-space:nowrap;}
.signout-btn{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font-b);margin-top:4px;text-align:right;display:block;}
.tab-nav{display:flex;margin-top:16px;}
.tab-btn{flex:1;padding:10px 2px;font-size:12px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:var(--font-b);transition:color .15s,border-color .15s;display:flex;align-items:center;justify-content:center;gap:4px;}
.tab-btn.active{color:var(--peach);border-bottom-color:var(--peach);}
.tab-btn svg{width:13px;height:13px;flex-shrink:0;}
.tab-content{flex:1;padding:20px 16px;background:var(--navy-dark);}
.view{display:none;}.view.active{display:block;}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.yt-wrap{border-radius:var(--radius-sm);overflow:hidden;background:#000;margin-bottom:14px;border:1px solid var(--card-border);aspect-ratio:16/9;width:100%;}
.yt-wrap iframe{width:100%;height:100%;border:none;display:block;}
.demo-label{font-size:11px;color:var(--peach);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.pill-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.pill{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;background:var(--peach-pale);border:1px solid rgba(232,168,124,.32);color:var(--peach-light);display:flex;align-items:center;gap:4px;}
.pill.green{background:var(--green-bg);border-color:var(--green-border);color:var(--green);}
.pill.blue{background:rgba(90,140,232,0.15);border-color:rgba(90,140,232,0.35);color:#8ab4f8;}
.yt-input-wrap{position:relative;margin-bottom:8px;}
.yt-input-wrap input{width:100%;padding:11px 12px 11px 40px;background:rgba(255,255,255,.07);border:1px solid var(--card-border);border-radius:var(--radius-sm);color:var(--white);font-size:14px;font-family:var(--font-b);transition:border-color .15s;}
.yt-input-wrap input:focus{outline:none;border-color:var(--peach);}
.yt-input-wrap input::placeholder{color:var(--muted);}
.yt-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
.yt-valid{font-size:12px;color:var(--green);display:flex;align-items:center;gap:5px;margin-bottom:8px;}
.yt-invalid{font-size:12px;color:var(--danger);margin-bottom:8px;}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;margin-top:12px;background:var(--peach);color:var(--navy-dark);font-family:var(--font-d);font-size:20px;letter-spacing:1px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:opacity .15s;}
.btn-primary:hover{opacity:.87;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-approve{padding:5px 11px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font-b);}
.btn-reject{padding:5px 9px;background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border);border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font-b);}
.status-box{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);margin-top:10px;}
.status-box.pending{background:var(--peach-pale);border:1px solid rgba(232,168,124,.25);}
.status-box.approved{background:var(--green-bg);border:1px solid var(--green-border);}
.status-box.rejected{background:var(--danger-bg);border:1px solid var(--danger-border);}
.lb-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:13px 10px;text-align:center;}
.stat-num{font-family:var(--font-d);font-size:28px;color:var(--peach);line-height:1;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.lb-row{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:var(--radius-sm);margin-bottom:7px;background:var(--card-bg);border:1px solid var(--card-border);}
.lb-row.gold{background:rgba(232,168,124,.1);border-color:rgba(232,168,124,.28);}
.lb-rank{font-family:var(--font-d);font-size:22px;color:var(--muted);width:24px;text-align:center;flex-shrink:0;}
.lb-rank.r1{color:#ffd700;}.lb-rank.r2{color:#c0c0c0;}.lb-rank.r3{color:#cd7f32;}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:12px;flex-shrink:0;}
.lb-pts{font-family:var(--font-d);font-size:22px;color:var(--peach);flex-shrink:0;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;background:rgba(255,255,255,.07);border:1px solid var(--card-border);border-radius:var(--radius-sm);color:var(--white);font-size:14px;font-family:var(--font-b);transition:border-color .15s;}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--peach);}
.field textarea{resize:vertical;min-height:68px;}
.pts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pending-row{display:flex;align-items:flex-start;gap:10px;padding:12px 13px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-sm);margin-bottom:8px;transition:opacity .3s;}
.pending-row.fading{opacity:.25;pointer-events:none;}
.admin-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.admin-section{margin-bottom:22px;}
.coach-yt-wrap{border-radius:var(--radius-sm);overflow:hidden;background:#000;border:1px solid var(--card-border);aspect-ratio:16/9;width:100%;margin-bottom:6px;}
.coach-yt-wrap iframe{width:100%;height:100%;border:none;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#151840 0%,#1e2157 55%,#252a6e 100%);padding:20px;}
.login-card{width:100%;max-width:320px;background:rgba(255,255,255,.05);border:1px solid var(--card-border);border-radius:16px;padding:30px 24px;text-align:center;}
.login-crest{width:80px;height:80px;border-radius:13px;overflow:hidden;border:2px solid var(--peach);margin:0 auto 16px;}
.login-crest img{width:100%;height:100%;object-fit:cover;}
.login-title{font-family:var(--font-d);font-size:26px;letter-spacing:1px;margin-bottom:3px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:22px;}
.login-error{font-size:12px;color:var(--danger);margin-top:10px;}
.toast{display:flex;align-items:center;gap:7px;padding:9px 13px;border-radius:var(--radius-sm);font-size:13px;margin-top:10px;background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid rgba(232,168,124,.2);border-top-color:var(--peach);animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-center{display:flex;justify-content:center;align-items:center;padding:40px;}
.section-title{font-family:var(--font-d);font-size:24px;letter-spacing:.5px;margin-bottom:4px;}
.section-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:13px;}
.flex-1{flex:1;min-width:0;}
.text-muted{color:var(--muted);font-size:13px;}
.reject-form{display:flex;flex-direction:column;gap:5px;flex:1;}
.reject-form input{padding:5px 8px;background:rgba(255,255,255,.07);border:1px solid var(--card-border);border-radius:6px;color:var(--white);font-size:12px;font-family:var(--font-b);}
.reject-form input:focus{outline:none;border-color:var(--danger);}
.reject-actions{display:flex;gap:6px;align-items:center;}
.cancel-link{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font-b);}
a.watch-yt{font-size:12px;color:var(--peach);text-decoration:none;display:inline-flex;align-items:center;gap:3px;margin-top:3px;}
a.watch-yt:hover{text-decoration:underline;}
.daily-banner{background:linear-gradient(135deg,rgba(90,140,232,0.15),rgba(90,140,232,0.05));border:1px solid rgba(90,140,232,0.3);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.daily-streak-num{font-family:var(--font-d);font-size:36px;color:#8ab4f8;line-height:1;flex-shrink:0;}
.streak-toast{background:rgba(255,200,60,0.15);border:1px solid rgba(255,200,60,0.35);color:#ffd700;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-crest"><img id="login-crest-img" src="" alt="Land United FC" /></div>
    <div class="login-title">Land United FC</div>
    <div class="login-sub">Sign in with your username &amp; PIN</div>
    <div class="field" style="text-align:left"><label>Username</label><input id="login-user" type="text" placeholder="e.g. marcus_r" autocapitalize="none" autocomplete="username" /></div>
    <div class="field" style="text-align:left"><label>PIN</label><input id="login-pin" type="password" placeholder="4-digit PIN" maxlength="4" inputmode="numeric" autocomplete="current-password" /></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-err" style="display:none"></div>
    <p style="font-size:11px;color:var(--muted);margin-top:18px;">Forgotten your PIN? Contact your coach.</p>
  </div>
</div>

<div id="app" style="display:none">
  <header class="site-header">
    <div class="header-top">
      <div style="display:flex;align-items:center;gap:13px;">
        <div class="header-crest"><img id="header-crest-img" src="" alt="Land United FC" /></div>
        <div><div class="header-title">Land United FC</div><div class="header-sub">Weekly squad challenges</div></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <div class="week-badge" id="week-badge">Week 1</div>
        <button class="signout-btn" onclick="doSignOut()" id="user-label">Sign out</button>
      </div>
    </div>
    <nav class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('challenge')" id="tab-challenge-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Weekly
      </button>
      <button class="tab-btn" onclick="switchTab('daily')" id="tab-daily-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Daily
      </button>
      <button class="tab-btn" onclick="switchTab('leaderboard')" id="tab-leaderboard-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 20 18 10"/><polyline points="12 20 12 4"/><polyline points="6 20 6 14"/></svg>Leaderboard
      </button>
      <button class="tab-btn" onclick="switchTab('coach')" id="tab-coach-btn" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Coach
      </button>
    </nav>
  </header>
  <div class="tab-content">
    <div class="view active" id="view-challenge"><div id="challenge-content"><div class="loading-center"><div class="spinner"></div></div></div></div>
    <div class="view" id="view-daily"><div id="daily-content"><div class="loading-center"><div class="spinner"></div></div></div></div>
    <div class="view" id="view-leaderboard"><div id="lb-content"><div class="loading-center"><div class="spinner"></div></div></div></div>
    <div class="view" id="view-coach"><div id="coach-content"><div class="loading-center"><div class="spinner"></div></div></div></div>
  </div>
</div>

<script>
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON)
let currentSession=null,currentProfile=null,activeChallenge=null,playerYouTubeId=null,dailyYouTubeId=null,coachYouTubeId=null

document.getElementById('login-crest-img').src=CREST_URL
document.getElementById('header-crest-img').src=CREST_URL
sb.auth.getSession().then(({data})=>{ if(data.session) bootApp(data.session) })
sb.auth.onAuthStateChange((_e,session)=>{ if(session&&!currentSession) bootApp(session); else if(!session) showLogin() })
document.getElementById('login-pin').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin() })
document.getElementById('login-user').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('login-pin').focus() })

async function bootApp(session) {
  currentSession=session
  const {data:profile}=await sb.from('profiles').select('*').eq('id',session.user.id).single()
  currentProfile=profile
  document.getElementById('login-screen').style.display='none'
  document.getElementById('app').style.display='flex'
  document.getElementById('user-label').textContent=(profile?.display_name||'Player')+' · sign out'
  document.getElementById('week-badge').textContent=getWeekLabel()
  if(profile?.is_coach) document.getElementById('tab-coach-btn').style.display=''
  loadChallenge()
}
function showLogin(){currentSession=null;currentProfile=null;document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';}
async function doLogin(){
  const user=document.getElementById('login-user').value.trim().toLowerCase()
  const pin=document.getElementById('login-pin').value.trim()
  const err=document.getElementById('login-err'),btn=document.getElementById('login-btn')
  if(!user||pin.length<4){showErr(err,'Enter your username and 4-digit PIN.');return}
  btn.disabled=true;btn.textContent='Signing in…';err.style.display='none'
  const{error}=await sb.auth.signInWithPassword({email:user+'@landunited.internal',password:pin})
  if(error){showErr(err,'Incorrect username or PIN.');btn.disabled=false;btn.textContent='Sign In'}
}
async function doSignOut(){await sb.auth.signOut()}

function switchTab(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'))
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'))
  document.getElementById('view-'+name).classList.add('active')
  document.getElementById('tab-'+name+'-btn').classList.add('active')
  if(name==='leaderboard') loadLeaderboard()
  if(name==='coach') loadCoachPanel()
  if(name==='daily') loadDaily()
}

function extractYouTubeId(url){
  if(!url) return null; url=url.trim()
  let m=url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if(m) return m[1]
  m=url.match(/[?&]v=([a-zA-Z0-9_-]{11})/); if(m) return m[1]
  m=url.match(/shorts\/([a-zA-Z0-9_-]{11})/); if(m) return m[1]
  if(/^[a-zA-Z0-9_-]{11}$/.test(url)) return url
  return null
}
function ytEmbed(id){return 'https://www.youtube-nocookie.com/embed/'+id+'?rel=0&modestbranding=1'}

/* WEEKLY CHALLENGE */
async function loadChallenge(){
  const el=document.getElementById('challenge-content')
  el.innerHTML='<div class="loading-center"><div class="spinner"></div></div>'
  try{
    const{data:c}=await sb.from('challenges').select('*').eq('is_active',true).limit(1).maybeSingle()
    activeChallenge=c
    if(!c){el.innerHTML='<p class="text-muted" style="text-align:center;padding-top:30px">No active challenge yet.<br>Check back Monday morning!</p>';return}
    const{data:sub}=await sb.from('submissions').select('*').eq('challenge_id',c.id).eq('player_id',currentSession.user.id).maybeSingle()
    renderChallenge(el,c,sub)
  }catch(e){el.innerHTML='<p class="text-muted">Could not load challenge.</p>';console.error(e)}
}
function renderChallenge(el,c,sub){
  el.innerHTML='<div class="card"><div class="section-title">'+esc(c.title)+'</div><p class="section-desc">'+esc(c.description)+'</p>'
  +(c.demo_video_url?'<div class="demo-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>Coach demo</div><div class="yt-wrap"><iframe src="'+ytEmbed(extractYouTubeId(c.demo_video_url))+'" allowfullscreen loading="lazy"></iframe></div>':'')
  +'<div class="pill-row"><span class="pill">&#11088; '+c.flat_points+' pts</span>'
  +(c.day1_bonus>0?'<span class="pill green">+'+c.day1_bonus+' pts day 1</span>':'')
  +(c.day2_bonus>0?'<span class="pill green">+'+c.day2_bonus+' pts day 2</span>':'')
  +(c.day3_bonus>0?'<span class="pill green">+'+c.day3_bonus+' pts day 3</span>':'')
  +'</div><div id="submission-area">'+renderSubmissionArea(sub,c)+'</div></div>'
  +'<p style="font-size:12px;color:var(--muted);text-align:center">Max possible this week: '+(c.flat_points+c.day1_bonus)+' pts</p>'
}
function renderSubmissionArea(sub,c){
  if(!sub) return '<div style="margin-bottom:4px;font-size:13px;font-weight:500">Submit your YouTube link</div><p style="font-size:12px;color:var(--muted);margin-bottom:10px">Upload your attempt to YouTube (can be unlisted), then paste the link below.</p><div class="yt-input-wrap"><span class="yt-icon">&#9654;&#65039;</span><input id="yt-link-input" type="url" placeholder="https://youtube.com/watch?v=..." oninput="handleYTInput(this.value)" /></div><div id="yt-feedback"></div><div id="yt-preview" style="display:none"><div class="yt-wrap" style="margin-bottom:8px"><iframe id="yt-preview-frame" src="" allowfullscreen loading="lazy"></iframe></div></div><button class="btn-primary" id="submit-btn" onclick="submitYouTube()" disabled>Submit for Coach Review</button><div id="submit-error" style="color:var(--danger);font-size:13px;margin-top:8px;display:none"></div>'
  const bonus=calcBonus(c,sub.submitted_at)
  const fmt=new Date(sub.submitted_at).toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
  const ytId=extractYouTubeId(sub.video_url)
  const ytLink=ytId?'<a class="watch-yt" href="'+sub.video_url+'" target="_blank" rel="noreferrer">Watch on YouTube &#8599;</a>':''

/* APPROVE / REJECT */
async function checkStreakBonus(playerId){
  const{data}=await sb.from('daily_submissions').select('submitted_date').eq('player_id',playerId).eq('status','approved').order('submitted_date',{ascending:false}).limit(STREAK_DAYS)
  if(!data||data.length<STREAK_DAYS) return false
  for(let i=0;i<data.length-1;i++){
    const diff=(new Date(data[i].submitted_date)-new Date(data[i+1].submitted_date))/(1000*60*60*24)
    if(diff!==1) return false
  }
  return true
}
async function approveSub(subId,type,points){
  const row=document.getElementById('pr-'+type+'-'+subId)
  if(row) row.classList.add('fading')
  try{
    const table=type==='daily'?'daily_submissions':'submissions'
    const{data:sub}=await sb.from(table).select('player_id').eq('id',subId).single()
    await sb.from(table).update({status:'approved',points_awarded:points,reviewed_at:new Date().toISOString()}).eq('id',subId)
    await sb.rpc('add_points',{player_id:sub.player_id,amount:points})
    if(type==='daily'){
      const hasStreak=await checkStreakBonus(sub.player_id)
      if(hasStreak){
        await sb.rpc('add_points',{player_id:sub.player_id,amount:STREAK_BONUS})
        const t=document.getElementById('streak-toast')
        if(t){t.style.display='flex';setTimeout(()=>t.style.display='none',4000)}
      }
    }
    setTimeout(()=>{ if(row) row.remove() },350)
  }catch(e){ if(row) row.classList.remove('fading'); console.error(e) }
}
function showRejectForm(subId,type){
  document.getElementById('actions-'+type+'-'+subId).innerHTML='<div class="reject-form"><input id="reason-'+subId+'" placeholder="Reason for rejection (optional)" /><div class="reject-actions"><button class="btn-reject" onclick="confirmReject(\''+subId+'\',\''+type+'\')">Confirm reject</button><button class="cancel-link" onclick="cancelReject(\''+subId+'\',\''+type+'\')">Cancel</button></div></div>'
}
function cancelReject(subId,type){
  const pts=type==='daily'?DAILY_POINTS:50
  document.getElementById('actions-'+type+'-'+subId).innerHTML='<button class="btn-approve" onclick="approveSub(\''+subId+'\',\''+type+'\','+pts+')">&#10003; Approve</button><button class="btn-reject" onclick="showRejectForm(\''+subId+'\',\''+type+'\')">&#10007; Reject</button>'
}
async function confirmReject(subId,type){
  const reason=document.getElementById('reason-'+subId)?.value||''
  const row=document.getElementById('pr-'+type+'-'+subId)
  if(row) row.classList.add('fading')
  try{
    const table=type==='daily'?'daily_submissions':'submissions'
    await sb.from(table).update({status:'rejected',rejection_reason:reason,reviewed_at:new Date().toISOString()}).eq('id',subId)
    setTimeout(()=>{ if(row) row.remove() },350)
  }catch(e){ if(row) row.classList.remove('fading'); console.error(e) }
}

/* MANUAL POINTS ADJUSTMENT */
async function adjustPoints(){
  const playerId=document.getElementById('adj-player').value
  const pts=parseInt(document.getElementById('adj-pts').value)
  const errEl=document.getElementById('adj-error')
  if(!playerId){errEl.style.display='block';errEl.textContent='Please select a player.';return}
  if(!pts||isNaN(pts)){errEl.style.display='block';errEl.textContent='Please enter a valid number of points.';return}
  const btn=document.getElementById('adj-btn')
  btn.disabled=true;btn.textContent='Applying…';errEl.style.display='none'
  try{
    await sb.rpc('add_points',{player_id:playerId,amount:pts})
    document.getElementById('adj-pts').value=''
    document.getElementById('adj-reason').value=''
    document.getElementById('adj-player').value=''
    showToast('adj-toast')
    btn.disabled=false;btn.textContent='&#9889; Apply Points'
  }catch(e){
    errEl.style.display='block';errEl.textContent='Something went wrong. Try again.'
    btn.disabled=false;btn.textContent='&#9889; Apply Points';console.error(e)
  }
}

/* COACH DEMO YT */
function handleCoachYTInput(val){
  const id=extractYouTubeId(val),fb=document.getElementById('coach-yt-feedback'),preview=document.getElementById('coach-yt-preview'),frame=document.getElementById('coach-yt-frame')
  if(!val.trim()){fb.innerHTML='';preview.style.display='none';coachYouTubeId=null;return}
  if(id){coachYouTubeId=id;fb.innerHTML='<div class="yt-valid" style="margin-top:5px">&#10003; Link recognised</div>';frame.src=ytEmbed(id);preview.style.display='block'}
  else{coachYouTubeId=null;fb.innerHTML='<div class="yt-invalid" style="margin-top:5px">Not a valid YouTube link.</div>';preview.style.display='none'}
}
function clearCoachYT(){coachYouTubeId=null;document.getElementById('coach-yt-input').value='';document.getElementById('coach-yt-feedback').innerHTML='';document.getElementById('coach-yt-preview').style.display='none';document.getElementById('coach-yt-frame').src=''}

/* POST CHALLENGE */
function getNextMondayNineAM(){
  const now=new Date(),day=now.getDay(),daysUntil=day===1?7:(8-day)%7||7
  const m=new Date(now); m.setDate(now.getDate()+daysUntil); m.setHours(14,0,0,0); return m.toISOString()
}
async function postChallenge(schedule){
  const title=document.getElementById('c-title').value.trim(),desc=document.getElementById('c-desc').value.trim()
  const flat=parseInt(document.getElementById('c-flat').value)||50,d1=parseInt(document.getElementById('c-d1').value)||0,d2=parseInt(document.getElementById('c-d2').value)||0,d3=parseInt(document.getElementById('c-d3').value)||0
  const errEl=document.getElementById('post-error')
  if(!title||!desc){errEl.style.display='block';errEl.textContent='Fill in the title and description.';return}
  const postBtn=document.getElementById('post-btn'),schedBtn=document.getElementById('schedule-btn')
  postBtn.disabled=true;schedBtn.disabled=true;errEl.style.display='none'
  if(schedule){schedBtn.textContent='Scheduling…'}else{postBtn.textContent='Publishing…'}
  try{
    const demoUrl=coachYouTubeId?'https://www.youtube.com/watch?v='+coachYouTubeId:null
    if(schedule){
      const{error:cErr}=await sb.from('challenges').insert({title,description:desc,demo_video_url:demoUrl,flat_points:flat,day1_bonus:d1,day2_bonus:d2,day3_bonus:d3,is_active:false,scheduled_for:getNextMondayNineAM()})
      if(cErr) throw cErr; showToast('schedule-toast')
    }else{
      await sb.from('challenges').update({is_active:false}).eq('is_active',true)
      const{data:c,error:cErr}=await sb.from('challenges').insert({title,description:desc,demo_video_url:demoUrl,flat_points:flat,day1_bonus:d1,day2_bonus:d2,day3_bonus:d3,is_active:true,scheduled_for:null}).select().single()
      if(cErr) throw cErr; activeChallenge=c; showToast('post-toast')
    }
    document.getElementById('c-title').value='';document.getElementById('c-desc').value='';clearCoachYT()
    postBtn.disabled=false;schedBtn.disabled=false;postBtn.textContent='&#128640; Publish Now';schedBtn.textContent='&#128197; Schedule Monday 9am'
  }catch(e){errEl.style.display='block';errEl.textContent='Something went wrong. Try again.';postBtn.disabled=false;schedBtn.disabled=false;postBtn.textContent='&#128640; Publish Now';schedBtn.textContent='&#128197; Schedule Monday 9am';console.error(e)}
}

/* ADD PLAYER */
async function addPlayer(){
  const name=document.getElementById('p-name').value.trim(),user=document.getElementById('p-user').value.trim().toLowerCase(),pin=document.getElementById('p-pin').value.trim()
  const errEl=document.getElementById('player-error')
  if(!name||!user||pin.length!==4){errEl.style.display='block';errEl.textContent='Fill in all fields. PIN must be exactly 4 digits.';return}
  const btn=document.getElementById('add-player-btn'); btn.disabled=true;btn.textContent='Adding…';errEl.style.display='none'
  try{
    const{error}=await sb.rpc('create_player',{p_display_name:name,p_username:user,p_pin:pin})
    if(error) throw error
    document.getElementById('p-name').value='';document.getElementById('p-user').value='';document.getElementById('p-pin').value=''
    showToast('player-toast'); btn.disabled=false;btn.textContent='+ Add Player'
  }catch(e){errEl.style.display='block';errEl.textContent='Could not add player. Add them manually via Supabase dashboard.';btn.disabled=false;btn.textContent='+ Add Player';console.error(e)}
}

/* HELPERS */
function calcBonus(c,submittedAt){
  if(!c||!submittedAt) return 0
  const h=(new Date(submittedAt)-new Date(c.created_at))/3600000
  if(h<=24) return c.day1_bonus||0; if(h<=48) return c.day2_bonus||0; if(h<=72) return c.day3_bonus||0; return 0
}
function getWeekLabel(){const start=new Date('2025-01-06');return 'Week '+Math.max(1,Math.floor((new Date()-start)/(7*24*3600*1000))+1)}
function esc(str){if(!str) return '';return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showErr(el,msg){el.style.display='block';el.textContent=msg}
function showToast(id){const t=document.getElementById(id);if(t){t.style.display='flex';setTimeout(()=>t.style.display='none',3500)}}
</script>
